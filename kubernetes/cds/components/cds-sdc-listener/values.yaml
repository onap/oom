#################################################################
# Global configuration defaults.
#################################################################
global:
  # Change to an unused port prefix range to prevent port conflicts
  # with other instances running within the same k8s cluster
  nodePortPrefix: 302

  # image pull policy
  pullPolicy: Always

  persistence:
    mountPath: /dockerdata-nfs

  tracing:
    enabled: false
    collector:
      baseUrl: http://jaeger-collector.istio-config
      port:
        zipkin: 9411
        otlpGrpc: 4317
        grpc: 14250
    sampling:
      probability: 1.0 # percentage of requests that are sampled (between 0-1/0%-100%)

#################################################################
# Application configuration defaults.
#################################################################
# application image
image: onap/ccsdk-sdclistener:1.9.1-STAGING-20260304T095144Z
name: sdc-listener
pullPolicy: Always

# flag to enable debugging - application support required
debugEnabled: false

kafkaUser:
  acls:
    - name: cds
      type: group
      operations: [Read]
    - name: SDC-DISTR
      type: topic
      patternType: prefix
      operations: [Read, Write]

config:
  appConfigDir: /opt/app/onap/config

# default number of instances
replicaCount: 1

nodeSelector: {}

affinity: {}

# probe configuration parameters
liveness:
  periodSeconds: 10
  # necessary to disable liveness probe when setting breakpoints
  # in debugger so K8s doesn't restart unresponsive container
  enabled: true

readiness:
  periodSeconds: 10

startup:
  periodSeconds: 2
  failureThreshold: 90

service:
  type: ClusterIP
  name: cds-sdc-listener
  internalPort: 8080
  ports:
    - name: http
      port: 8080

persistence:
  enabled: true

ingress:
  enabled: false

logback:
  rootLogLevel: INFO
  logger:
    springframework: INFO
    springframeworkWeb: INFO
    springframeworkSecurityWebauthentication: INFO
    hibernate: INFO
    onapCcsdkCds: INFO

flavor: small

resources:
  small:
    limits:
      cpu: "1500m"
      memory: "1000Mi"
    requests:
      cpu: "200m"
      memory: "500Mi"
  large:
    limits:
      cpu: "2"
      memory: "1.4Gi"
    requests:
      cpu: "1"
      memory: "1.4Gi"
  unlimited: {}

#Pods Service Account
serviceAccount:
  nameOverride: cds-sdc-listener
  roles:
    - read

readinessCheck:
  wait_for:
    timeout: 30
    services:
      - sdc-be
      - cds-blueprints-processor-http
