#################################################################
# Global configuration defaults.
#################################################################
global:
  nodePortPrefix: 302
  nodePortPrefixExt: 304
  persistence:
    mountPath: /dockerdata-nfs
  mariadbGalera:
    # flag to enable the DB creation via mariadb-operator
    useOperator: true
    service: mariadb-galera
    servicePort: '3306'
  tracing:
    enabled: false
    collector:
      baseUrl: http://jaeger-collector.istio-config
      port:
        zipkin: 9411
        otlpGrpc: 4317
        grpc: 14250
    sampling:
      probability: 1.0 # percentage of requests that are sampled (between 0-1/0%-100%)


readinessCheck:
  wait_for:
    jobs:
      - '{{ include "common.release" . }}-so-mariadb-config-job'

#################################################################
# Secrets metaconfig
#################################################################
secrets:
  - uid: db-user-creds
    type: basicAuth
    externalSecret: '{{ tpl (default "" .Values.db.userCredsExternalSecret) . }}'
    login: '{{ .Values.db.userName }}'
    password: '{{ .Values.db.userPassword }}'
    passwordPolicy: required
  - uid: db-admin-creds
    type: basicAuth
    externalSecret: '{{ tpl (default "" .Values.db.adminCredsExternalSecret) . }}'
    login: '{{ .Values.db.adminName }}'
    password: '{{ .Values.db.adminPassword }}'
    passwordPolicy: required

#secretsFilePaths: |
#  - 'my file 1'
#  - '{{ include "templateThatGeneratesFileName" . }}'

#################################################################
# Application configuration defaults.
#################################################################
image: onap/so/openstack-adapter:1.19.0-20260420T0700
pullPolicy: Always

# Local mariadb galera instance default name
mariadb-galera:
  nameOverride: so-mariadb-galera
  service:
    internalPort: 3306
  mariadbOperator:
    galera:
      enabled: false

db:
  userName: so_user
  userPassword: so_User123
  # userCredsExternalSecret: some secret
  adminName: so_admin
  adminPassword: so_Admin123
  # adminCredsExternalSecret: some secret

aai:
  auth: aai@aai.onap.org:demo123456!
org:
  onap:
    so:
      adapters:
        bpelauth: poBpmn:password1$
mso:

  auth:
    user: poBpmn
    password: password1$
  db:
    auth: Basic YnBlbDpwYXNzd29yZDEk

# Custom DNS configuration to work around ndots:5 + openstack.local
# search domain interaction causing permanent resolution failures
# for external hostnames like cloudapi.tnaplab.telekom.de.
dnsConfig:
  options:
    - name: ndots
      value: "3"

replicaCount: 1
minReadySeconds: 10
containerPort: &containerPort 8087
logPath: ./logs/openstack/
app: openstack-adapter
service:
  type: ClusterIP
  ports:
    - name: http
      port: *containerPort
updateStrategy:
  type: RollingUpdate
  maxUnavailable: 1
  maxSurge: 1

#################################################################
# soHelpers part
#################################################################
soHelpers:
  containerPort: *containerPort

# Resource Limit flavor -By Default using small
flavor: small
# Segregation for Different environment (Small, Medium and Large)
resources:
  small:
    limits:
      cpu: "1"
      memory: "768Mi"
    requests:
      cpu: "0.5"
      memory: "384Mi"
  medium:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "0.5"
      memory: "512Mi"
  large:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "1"
      memory: "1Gi"
  unlimited: {}
livenessProbe:
  path: /manage/health
  port: 8087
  scheme: HTTP
  periodSeconds: 60
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3
startupProbe:
  path: /manage/health
  port: 8087
  scheme: HTTP
  periodSeconds: 2
  failureThreshold: 90
  timeoutSeconds: 10
ingress:
  enabled: false
serviceMesh:
  authorizationPolicy:
    authorizedPrincipals:
      - serviceAccount: robot-read
      - serviceAccount: so-bpmn-infra-read
      - serviceAccount: so-read
config:
  openStackUserName: "vnf_user"
  openStackRegion: "RegionOne"
  openStackKeyStoneUrl: "http://1.2.3.4:5000/v2.0"
  openStackServiceTenantName: "service"
  openStackPassword: "openstackDemo"
  openStackTenantId: "d570c718cbc545029f40e50b75eb13df"
  # "KEYSTONE" for keystone v2, "KEYSTONE_V3" for keystone v3
  openStackKeystoneVersion: "KEYSTONE"
nodeSelector: {}
tolerations: []
affinity: {}

#Pods Service Account
serviceAccount:
  nameOverride: so-openstack-adapter
  roles:
    - read

#Logs configuration
log:
  path: /var/log/onap
logConfigMapNamePrefix: '{{ include "common.fullname" . }}'

podAnnotations:
  # disable istio-based tracing
  proxy.istio.io/config: |
    tracing:
      sampling: 0

tracing:
  skipPatterns:
    - /actuator/health/*
  scheduled:
    skipClasses:
      - ScheduledDnsLookup
      - ExternalTaskServiceUtils
